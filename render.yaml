# Render Blueprint for the Pixel Academy backend API.
# Usage: in the Render dashboard, "New +" -> "Blueprint" -> point at this repo.
# Render reads this file and creates the service below; you then fill in the
# secret env vars it leaves blank (sync: false) in the service's Environment tab.
#
# The frontend is NOT deployed here — deploy apps/web separately to Cloudflare
# Pages or Vercel (see docs/DEPLOY_FREE.md).

services:
  - type: web
    name: pixel-academy-api
    runtime: node
    plan: free
    region: singapore # closest free region to India; change if needed
    rootDir: .
    buildCommand: >
      npm install &&
      npm run build:shared &&
      npm run db:generate -w @pixel/backend &&
      npm run build -w @pixel/backend &&
      npm run db:deploy -w @pixel/backend
    startCommand: npm run start -w @pixel/backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_FORCE_PATH_STYLE
        value: "true"
      - key: SUPPLIER_STATE_CODE
        value: "37"
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
